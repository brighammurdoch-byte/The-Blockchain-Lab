# Nginx reverse proxy config for Blockchain Lab on Oracle Cloud
# Place in /etc/nginx/conf.d/blockchain-lab.conf (or sites-available)

server {
    listen 80;
    server_name _;  # Replace with your domain or VM IP later

    # Redirect all HTTP to HTTPS (once you have certs)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Important for WebSocket / Socket.io
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-lived mining / WS connections
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Health check endpoint (no caching)
    location /health {
        proxy_pass http://127.0.0.1:3000/health;
        proxy_set_header Host $host;
        add_header Cache-Control "no-cache";
    }
}
